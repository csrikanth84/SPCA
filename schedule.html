<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPCA | Schedule</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <img src="logo_cleaned.png" alt="SPCA Logo" class="logo" />
    <h1>South Peninsula Cricket Association</h1>
    <p class="motto">One Team • One Dream</p>
  </header>
 <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="team.html">Team</a></li>
      <li><a href="schedule.html">Schedule</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <section class="content">
      <h2>Match Schedule</h2>
      
      <div class="schedule-selector">
        <label for="year-select">Select Year:</label>
        <select id="year-select" onchange="navigateToSchedule()">
          <option value="schedule_2026.html">2026</option>
          <option value="schedule_2025.html">2025</option>
        </select>
      </div>

      <div class="schedule">
        <iframe id="schedule-iframe" src="schedule_2026.html"></iframe>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 South Peninsula Cricket Association | spcanet.com</p>
    <p>20500 Plymouth Road, Detroit, MI 48228</p>
    <div class="social-icons">
      <a href="https://www.facebook.com/share/16XpemtgJg/?mibextid=wwXIfr"><img src="icons_facebook.png" alt="Facebook"></a>
      <a href="https://www.instagram.com/spca_mi"><img src="icons_instagram.png" alt="Instagram"></a>
      <a href="#"><img src="icons_youtube.png" alt="Youtube"></a>
    </div>
  </footer>

  <script>
    function navigateToSchedule() {
      var select = document.getElementById('year-select');
      var iframe = document.getElementById('schedule-iframe');

      var selectedValue = select.value;
      if (selectedValue && iframe) {
        iframe.src = selectedValue;
      }
    }
    window.onload = function () {
    const select = document.getElementById('year-select');
    const current = window.location.pathname.split('/').pop();
    if (current.includes("2026")) select.value = "schedule_2026.html";
    if (current.includes("2025")) select.value = "schedule_2025.html";
  };
    // Load default schedule (2026) on page load
    document.addEventListener('DOMContentLoaded', function() {
      navigateToSchedule();
    });
  </script>
</body>
</html>
