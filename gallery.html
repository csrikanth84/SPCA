<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SPCA | Gallery</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .gallery-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .gallery-preview .nav {
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: white;
      font-size: 28px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-preview .nav:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .gallery-preview img.main-img {
      width: 100%;
      max-width: 760px;
      max-height: 520px;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
    }

    .gallery-grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
      overflow-x: auto;
      padding: 10px 0;
    }

    .gallery-thumb {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }

    .gallery-thumb:hover {
      transform: translateY(-2px);
      border-color: #0077cc;
    }

    .gallery-thumb.selected {
      border-color: #0057b8;
      opacity: 1;
    }
  </style>
</head>
<body>
<header>
  <img src="logo_cleaned.png" alt="SPCA Logo" class="logo" />
  <h1>South Peninsula Cricket Association</h1>
  <p class="motto">One Team • One Dream</p>
</header>
<header><h1>SPCA Gallery</h1></header>
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
<main>
  <section class="content">
    <h2>Match Moments</h2>

    <div class="gallery-preview">
      <button class="nav prev" onclick="navigate(-1)">&#10094;</button>
      <img id="mainGalleryImg" class="main-img" src="" alt="Selected gallery image">
      <button class="nav next" onclick="navigate(1)">&#10095;</button>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
  </section>
</main>
<footer>
  <p>&copy; 2024 South Peninsula Cricket Association | spcanet.com</p>
</footer>

<script>
  // Try to fetch list of images from server; fallback to a small hardcoded list if unavailable.
  let galleryImages = [];
  let currentIndex = 0;

  async function loadGalleryList() {
    try {
      const res = await fetch('Gallery');
      if (!res.ok) throw new Error('Network response not ok');
      const images = await res.json();
      if (Array.isArray(images) && images.length) {
        galleryImages = images;
      } else {
        galleryImages = fallbackImages();
      }
    } catch (e) {
      // fallback when no API available (e.g., static file viewing)
      galleryImages = fallbackImages();
    }
    renderGallery(galleryImages);
  }

  function fallbackImages() {
    return [      
      "Gallery/T20Match2TeamPic.jpeg",
      "Gallery/T20Match2Vyasa50.jpeg",
      "Gallery/T20Match2Rohit.jpeg",
        "Gallery/T20Match1KunalS.jpeg",
      "Gallery/T20Match1Prashanth.jpeg",
      "Gallery/T20Match1RohitS.jpeg",
       "Gallery/T30TeamMatch1.jpeg",
      "Gallery/HardFight.jpeg",
      "Gallery/TheDugOut.jpeg",
      "Gallery/GLT_M2_1.jpg",
      "Gallery/GLT_M2_2.jpg",
      "Gallery/GLT_M2_3.jpg",     
    ];
  }

  function renderGallery(images) {
    const grid = document.getElementById("galleryGrid");
    grid.innerHTML = "";
    images.forEach((src, index) => {
      const img = document.createElement("img");
      img.src = src;
      img.alt = src.split("/").pop();
      img.className = "gallery-thumb";
      img.onclick = () => openPreview(index);
      grid.appendChild(img);
    });
    openPreview(0);
  }

  function openPreview(index) {
    currentIndex = index;
    document.getElementById("mainGalleryImg").src = galleryImages[currentIndex] || '';
    const thumbs = document.querySelectorAll(".gallery-thumb");
    thumbs.forEach((thumb, idx) => {
      thumb.classList.toggle("selected", idx === currentIndex);
    });
  }

  function navigate(direction) {
    if (!galleryImages.length) return;
    currentIndex = (currentIndex + direction + galleryImages.length) % galleryImages.length;
    openPreview(currentIndex);
  }

  // Load gallery list on page load
  window.addEventListener('DOMContentLoaded', loadGalleryList);
</script>
</body>
</html>
